<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Application</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>To-Do List</h1>
      <p class="subtitle">Add, edit, and filter tasks — saved automatically in local storage</p>
    </header>

    <main class="main">
      <!-- Create: add new task -->
      <form id="todo-form" class="todo-form" autocomplete="off">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="What needs to be done?"
          maxlength="200"
          aria-label="New task"
        />
        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>

      <!-- Filter: All | Active | Completed -->
      <div class="toolbar">
        <div class="filters" role="tablist" aria-label="Filter tasks">
          <button type="button" class="filter-btn active" data-filter="all">All Tasks</button>
          <button type="button" class="filter-btn" data-filter="active">Active Tasks</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed Tasks</button>
        </div>
        <div class="stats">
          <span id="task-count">0 tasks left</span>
          <button type="button" id="clear-completed" class="btn btn-ghost" hidden>Clear completed</button>
        </div>
      </div>

      <!-- Read: dynamically rendered task list -->
      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add one above!</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
