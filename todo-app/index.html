<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="todo-app">
    <h1>Todo</h1>
    <section class="new-todo">
      <input id="newTodoInput" type="text" placeholder="What needs to be done?" autocomplete="off">
      <button id="addBtn">Add</button>
    </section>

    <section class="controls">
      <div class="filters">
        <button data-filter="all" class="filter active">All</button>
        <button data-filter="active" class="filter">Active</button>
        <button data-filter="completed" class="filter">Completed</button>
      </div>
      <button id="clearCompleted">Clear completed</button>
    </section>

    <ul id="todoList" class="todo-list" aria-live="polite"></ul>

    <footer class="footer">
      <span id="itemsLeft">0 items left</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
